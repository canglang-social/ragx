name: deploy

on:
  push:
    branches: [master]
    paths-ignore:
      - 'terraform/**'
      - '**.md'

permissions:
  contents: read
  id-token: write # ← WITHOUT THIS, NO OIDC TOKEN IS MINTED. EVER.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/774904927424/locations/global/workloadIdentityPools/github-pool/providers/github-provider # ← the wif_provider output
          service_account: github-actions@ragx-502306.iam.gserviceaccount.com # ← the sa_email output

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - run: |
          IMAGE=us-east4-docker.pkg.dev/ragx-502306/ragx/ragx:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - uses: pnpm/action-setup@v4
        with:
          version: 9.1.4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Eval gate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EMBED_API_KEY: ${{ secrets.EMBED_API_KEY }}
          GEN_API_KEY: ${{ secrets.GEN_API_KEY }}
          EMBEDDER: openai
          EMBED_BASE_URL: https://api.siliconflow.com/v1
          EMBED_MODEL: Qwen/Qwen3-Embedding-8B
          GENERATOR: openai
          GEN_BASE_URL: https://api.deepseek.com/v1
          GEN_MODEL: deepseek-chat
          VECTOR_STORE: pg
          PG_TABLE: chunks_q8
          PLANNER: llm
          RETRIEVER: hybrid
          RERANKER: crossencoder
          RERANK_BASE_URL: https://api.siliconflow.com/v1
          RERANK_MODEL: Qwen/Qwen3-Reranker-8B
          RERANK_CANDIDATES: '50'
          RERANK_TOP_N: '20'
          TOP_K: '20'
          EVAL_JUDGE: llm
          EVAL_LOG: '1'
          EVAL_MIN_RETRIEVAL: '0.90'
          EVAL_MIN_ANSWER: '0.90'
        run: pnpm eval

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ragx
          location: us-east4

      - run: |
          sed -i "s|ragx/ragx:.*|ragx/ragx:${{ github.sha }}|" k8s/deployment.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/ragx --timeout=5m
