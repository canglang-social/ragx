name: deploy

on:
  push:
    branches: [master]

permissions:
  contents: read
  id-token: write # ← WITHOUT THIS, NO OIDC TOKEN IS MINTED. EVER.

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/774904927424/locations/global/workloadIdentityPools/github-pool/providers/github-provider # ← the wif_provider output
          service_account: github-actions@ragx-502306.iam.gserviceaccount.com # ← the sa_email output

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker us-east4-docker.pkg.dev --quiet

      - run: |
          IMAGE=us-east4-docker.pkg.dev/ragx-502306/ragx/ragx:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ragx
          location: us-east4

      - run: |
          kubectl set image deployment/ragx \
            ragx=us-east4-docker.pkg.dev/ragx-502306/ragx/ragx:${{ github.sha }}
          kubectl rollout status deployment/ragx --timeout=5m
