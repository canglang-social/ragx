apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: ragx-cert
spec:
  domains:
    - ragx.felixhan.dev # ← your full hostname
---
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: ragx-frontendconfig
spec:
  redirectToHttps:
    enabled: true
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ragx-ingress
  annotations:
    kubernetes.io/ingress.global-static-ip-name: ragx-ip # ← the Terraform resource NAME, not the IP
    networking.gke.io/managed-certificates: ragx-cert
    networking.gke.io/v1beta1.FrontendConfig: ragx-frontendconfig
spec:
  ingressClassName: gce
  rules:
    - host: ragx.felixhan.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ragx-service
                port:
                  number: 80
